<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Expense Tracker</h1>

    <section class="card">
      <h2>Add New Expense</h2>
      <form id="expense-form">
        <div class="form-group">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" step="0.01" required>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" required>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Utilities">Utilities</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <input type="text" id="description" required>
        </div>

        <button type="submit">Add Expense</button>
      </form>
      <p id="system-message" class="message"></p>
    </section>

    <section class="card">
      <h2>Filter Total By Category</h2>
      <div class="form-group">
        <label for="filter-category">Select Category</label>
        <select id="filter-category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Utilities">Utilities</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="filter-min-amount">Minimum Amount ($)</label>
        <input type="number" id="filter-min-amount" step="0.01" value="0">
      </div>
      
      <button id="btn-view-category" class="secondary-btn">Calculate Specific Total</button>
      
      <div id="filter-display" class="message" style="margin-top: 15px; font-size: 1.2em;"></div>
    </section>

    <section class="card">
      <h2>Expense Summary</h2>
      <button id="btn-view-summary" class="secondary-btn">Generate Report</button>
      
      <div id="summary-display" class="summary-board"></div>
    </section>
  </div>

  <script type="importmap">
    {
      "imports": {
        "uuid": "https://cdn.jsdelivr.net/npm/uuid@9.0.0/+esm"
      }
    }
  </script>
  <script type="module" src="./dom.js"></script>

</body>
</html>
